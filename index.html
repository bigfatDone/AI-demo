<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>企业级 RAG 知识库</title>
  <style>
    body{max-width:900px;margin:20px auto;padding:20px;font-family:Arial;background:#f7f8fa}
    .panel{background:white;padding:20px;border-radius:12px;margin-bottom:20px}
    textarea{width:100%;height:120px;padding:10px;border-radius:8px;border:1px solid #ddd}
    #chat{height:50vh;overflow-y:auto;padding:10px;background:#f9f9f9;border-radius:8px}
    .msg{margin:8px;padding:10px;border-radius:8px}
    .user{background:#007bff;color:white;text-align:right}
    .bot{background:#e1f5fe;text-align:left}
    button{padding:10px 20px;background:#007bff;color:white;border:none;border-radius:8px;cursor:pointer}
    .input-line{display:flex;gap:10px;margin-top:10px}
    input{flex:1;padding:10px;border-radius:8px;border:1px solid #ddd}
  </style>
</head>
<body>

<div class="panel">
  <h3>📚 上传企业知识库</h3>
  <textarea id="docContent" placeholder="粘贴文档：接口手册、项目规范、技术方案、合同..."></textarea>
  <button onclick="uploadDoc()" style="margin-top:10px">构建向量库</button>
  <div id="uploadStatus"></div>
</div>

<div class="panel">
  <h3>💬 RAG 智能问答</h3>
  <div id="chat"></div>
  <div class="input-line">
    <input id="question" placeholder="输入问题..." />
    <button onclick="ask()">发送</button>
  </div>
</div>

<script>
  const chat = document.getElementById('chat');

  // 上传文档构建知识库
  async function uploadDoc() {
    const content = document.getElementById('docContent').value;
    const res = await fetch('http://localhost:3000/api/rag/upload', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const data = await res.json();
    document.getElementById('uploadStatus').innerText = data.msg;
  }

  // RAG 提问
  async function ask() {
    const question = document.getElementById('question').value;
    if (!question) return;

    chat.innerHTML += `<div class='msg user'>${question}</div>`;
    document.getElementById('question').value = '';

    const bot = document.createElement('div');
    bot.className = 'msg bot';
    chat.appendChild(bot);

    const res = await fetch('http://localhost:3000/api/rag/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();

    let answer = ''
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n').filter(Boolean);

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const json = line.replace('data: ', '');
            if (json === '[DONE]') continue;
            try {
              const data = JSON.parse(json);
              answer += data.choices[0].delta.content || '';
              bot.innerText = answer;
              chat.scrollTop = chat.scrollHeight;
            } catch (e) {}
          }
    }
  }
</script>
</body>
</html>
